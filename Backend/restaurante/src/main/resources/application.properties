#Nombre de MI APLICACION
spring.application.name=restaurante

#Configuraciones de la base de datos, especificamos a que base de datos se tiene que conectar
spring.datasource.url=jdbc:mysql://localhost:3306/restaurante_red_panda
spring.datasource.username=root
spring.datasource.password=

#Driver para la base de datos
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#Estas lineas sirven para que al iniciar RECREE la base de datos , funciona como una migracion
#Borra las tablas y lee las entidades que existen para crearlas como tablas
#Así evitamos errores de duplicado 
spring.jpa.hibernate.ddl-auto=create
spring.sql.init.mode=always

spring.jpa.defer-datasource-initialization=true

#Para mostrar sql en la consola
spring.jpa.show-sql=true

#Puerto en el que abre la aplicacion
server.port=8081
server.address=0.0.0.0

# -1 indica que la cookie expira cuando se cierra el navegador
server.servlet.session.cookie.max-age=-1

# Tiempo de espera por inactividad (por si deja la pestaña abierta sin hacer nada)
server.servlet.session.timeout=60m

# Esto le dice a Spring que NO use su configuración de seguridad automática
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration